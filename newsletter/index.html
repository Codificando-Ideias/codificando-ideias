<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter | Codificando Ideias</title>

    <!-- Favicon -->
    <link rel="icon" href="../assets/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (você está usando bi-*) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS NEWSLETTER -->
  <link rel="stylesheet" href="../css/newsletter.css">

</head>

<body class="bg-dark text-light">

  <!-- NEWSLETTER -->
  <section id="newsletter" class="section-dark text-center">
    <div class="container">
 <div class="logo-brand-wrapper">
      <a href="index.html">

        <img src="../assets/imgLogo2.png"
            alt="Codificando Ideias"
            class="logo-newsletter">
      </a>
  <span class="newsletter-tagline">
    <i class="bi bi-envelope-paper-fill me-2"></i>
        Newsletter
  </span>
</div>

      <p class="col-md-8 mx-auto">
        Acreditamos que tecnologia não substitui o humano — ela o potencializa. </br>
        Receba conteúdos sobre tecnologia, IA e inovação aplicada a negócios.
      </p>

      <form id="newsletterForm" class="col-md-6 mx-auto text-start">

        <!-- Nome -->
        <div class="mb-3">
          <label class="form-label">Seu nome</label>
          <input id="name" type="text" class="form-control" placeholder="Digite seu nome" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Seu e-mail</label>
          <input id="email" type="email" class="form-control" placeholder="Digite seu e-mail" required>
        </div>

        <!-- WhatsApp -->
        <div class="mb-4">
          <label class="form-label">WhatsApp</label>
          <input id="whatsapp" type="tel" class="form-control" placeholder="(00) 00000-0000" required>
        </div>

        <!-- Aceite -->
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="acceptedTerms" required>
          <label class="form-check-label">
            Concordo em receber conteúdos da Codificando Ideias.
          </label>
        </div>

        <!-- Honeypot -->
        <input type="text" id="company" style="display:none">

        <button type="submit" class="btn btn-gradient w-100 btn-lg">
          <i class="bi bi-send-fill me-2"></i>
          Inscrever-se
        </button>

        <p class="small text-center mt-3 text-white-50">
          Você pode cancelar a inscrição a qualquer momento.
        </p>

      </form>

    </div>
  </section>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
  <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        Mensagem enviada com sucesso!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

  <!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- reCAPTCHA PRIMEIRO -->
<script src="https://www.google.com/recaptcha/api.js?render=6Lety3ksAAAAADEtcTLeuqBxTg44KFusC2y1QO0j"></script>

<script src="../js/configSettings.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/newsletter/newsletter.js"></script>
</body>
</html>
