<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar Inscrição | Codificando Ideias</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/newsletter.css">
</head>

<body class="bg-dark text-light">

<section id="newsletter" class="section-dark text-center">
  <div class="container">

    <h2 class="mb-4">
      <i class="bi bi-x-circle-fill me-2"></i>
      Cancelar Inscrição
    </h2>

    <p class="mb-5 col-md-8 mx-auto">
      Lamentamos ver você partir.  
      Confirme abaixo se deseja cancelar o recebimento da newsletter.
    </p>

    <div class="col-md-6 mx-auto">

      <div id="unsubscribeBox" class="p-4 rounded border border-secondary bg-black">
        <p id="emailDisplay" class="mb-4 text-muted"></p>

        <button id="confirmUnsubscribe" class="btn btn-danger w-100">
          Confirmar Cancelamento
        </button>

        <div id="feedback" class="mt-4"></div>
      </div>

    </div>

  </div>
</section>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/configSettings.js"></script>
<script src="../js/newsletter/unsubscribe.js"></script>

</body>
</html>
