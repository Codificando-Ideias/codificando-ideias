<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Codificando Ideias</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body {
  margin: 0;
  background: radial-gradient(circle at 20% 20%, #1e293b, #0f172a 60%);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.login-wrapper {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 380px;
  padding: 40px 30px;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 40px rgba(124, 58, 237, 0.2);
  color: #fff;
}

.logo-area {
  text-align: center;
  margin-bottom: 30px;
}

.logo-area img {
  height: 60px;
  margin-bottom: 10px;
}

.logo-area h5 {
  font-weight: 600;
  letter-spacing: 1px;
}

.form-control {
  background-color: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
}

.form-control:focus {
  background-color: rgba(255,255,255,0.08);
  border-color: #7C3AED;
  box-shadow: none;
  color: #fff;
}

.btn-gradient {
  background: linear-gradient(45deg, #2563EB, #7C3AED);
  border: none;
  transition: 0.3s;
}

.btn-gradient:hover {
  opacity: 0.9;
}

.footer-text {
  font-size: 0.8rem;
  text-align: center;
  margin-top: 20px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="login-wrapper">

  <div class="login-card">

    <div class="logo-area">
      <!-- Troque pelo seu logo -->
      <img src="../assets/imgLogo2.png" alt="Codificando Ideias">
      <h5>Painel Administrativo</h5>
    </div>

    <form id="loginForm">

      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-0 text-light">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" id="email" class="form-control" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-0 text-light">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" id="senha" class="form-control" required>
        </div>
      </div>

      <button type="submit" class="btn btn-gradient w-100 mt-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Entrar
      </button>

      <div id="erro" class="text-danger mt-3 text-center small"></div>

    </form>

    <div class="footer-text">
      © <script>document.write(new Date().getFullYear());</script> Codificando Ideias
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/configSettings.js"></script>
<script src="../js/login/supabaseClient.js"></script>
<script src="../js/login/login.js"></script>

</body>
</html>
